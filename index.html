  	for (let i = arr.length - 1; i > 0; i--) {

    	[arr[i], arr[j]] = [arr[j], arr[i]];

}

  function drawLine(n, m) {
    if (lineList.filter(line => line.includes(n) && line.includes(m)).length == 1) {
      return lineList.find(line => line.includes(n) && line.includes(m));
    }
  }

  function linesOf(n) {
    return lineList.filter(line => line.includes(n))
  }

  function intersection(line1, line2) {
    return [...Array(13).keys()].find(n => line1.includes(n) && line2.includes(n))
  }

  function swapTiles() {

    if (permutablePoints[this.buttonID] == 0) {
      document.getElementById("textBox").textContent = "A Pokemon cannot teleport into itself!";
    }

    if (permutablePoints[this.buttonID] != 0) {
